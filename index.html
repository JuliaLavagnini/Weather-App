<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="App">
      <div class="container">
        <div class="weatherApp">
          <form id="search-form">
            <input
              type="text"
              id="textfield"
              autofocus="off"
              autocomplete="off"
              placeholder="Search a city"
            />
            <input class="btn btn-sm" type="button" value="Submit" />
            <button type="button" class="btn btn-sm" id="currentLocation">
              Location
            </button>
          </form>
          <div class="row">
            <div class="col-6">
              <img src="https://icons8.com/icon/648/sun" alt="Sunny" />
              <h2 id="description">Clear Sky</h2>
            </div>
            <div class="col-6">
              <ul>
                <li>
                  <strong>Wind</strong> <br />
                  2 km/r
                </li>
                <li>
                  <strong>Humdity</strong> <br />
                  70%
                </li>
              </ul>
            </div>
          </div>
          <div class="row">
            <div class="col-6">
              <h2>21</h2>
              <h2 id="description">Clear Sky</h2>
            </div>
            <div class="col-6">
              <ul>
                <li>
                  <strong>Sunset</strong> <br />
                  17:04
                </li>
                <li>
                  <strong>Sunrise</strong> <br />
                  7:00
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
